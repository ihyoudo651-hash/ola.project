<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Photo Collection</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 3rem 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
      padding-bottom: 1.5rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
    }
    .back-btn {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.2s;
    }
    .back-btn:hover {
      color: #7dd3fc;
    }
    
    /* Responsive Masonry Photo Grid */
    .gallery-grid {
      columns: 3 300px;
      column-gap: 1.5rem;
    }
    .gallery-item {
      background-color: #1e293b;
      margin-bottom: 1.5rem;
      break-inside: avoid;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.5);
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>My Photo Collection</h1>
      <a href="#" onclick="window.close(); return false;" class="back-btn">← Close Tab</a>
    </header>

    <main class="gallery-grid">
      <div class="gallery-item">
        <img src="aura macks.jpg" alt="Aura Macks">
      </div>
      
      <div class="gallery-item">
        <img src="cool ari.jpg" alt="Cool Ari">
      </div>
      
      <div class="gallery-item">
        <img src="fun times.jpg" alt="Fun Times">
      </div>
      
      <div class="gallery-item">
        <img src="gng.jpg" alt="Gng">
      </div>
      
      <div class="gallery-item">
        <img src="gussy.jpg" alt="Gussy">
      </div>
      
      <div class="gallery-item">
        <img src="hair cutting.jpg" alt="Hair Cutting">
      </div>
      
      <div class="gallery-item">
        <img src="ari.jpg" alt="Ari">
      </div>
      
      <div class="gallery-item">
        <img src="ooo.jpg" alt="Ooo">
      </div>
      
      <div class="gallery-item">
        <img src="gig slade 2.jpg" alt="Ooo">
      </div>
      
      <div class="gallery-item">
        <img src="prom.jpg" alt="Prom">
      </div>
      
      <div class="gallery-item">
        <img src="Snapchat-976442242.jpg" alt="Snapchat Setup">
      </div>
    </main>
  </div>

</body>
</html>
